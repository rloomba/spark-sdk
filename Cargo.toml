tonic = { version = "0.12.3", default-features = false }
tonic-build = { version = "0.12.3", features = ["prost"] }
tonic-web-wasm-client = "0.6"
tower-service = "0.3.3"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
tsify-next = {version = "0.5.5", default-features = false}
# Fork of uniffi 0.29.5 that fixes Python Protocol generation for async callback
# methods (plain `def` instead of `async def`). Fixed upstream in 0.30.0.
# Switch back to upstream once we upgrade to uniffi >= 0.30.
uniffi = { git = "https://github.com/breez/uniffi-rs", branch = "fix-python-async-protocol-v0.29.5" }
url = "2.5"
uuid = { version = "1.17.0", features = ["v7", "v5", "v4"] }
wasm-bindgen = "0.2.100"
wasm-bindgen-futures = "0.4.50"
wasm-bindgen-test = "0.3.50"
web-sys = { version = "0.3.77", features = ["console", "DomException"] }
webpki-roots = "1.0"
xshell = "0.2"
