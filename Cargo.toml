spark = { path = "crates/spark", default-features = false }
spark-mysql = { path = "crates/spark-mysql" }
spark-postgres = { path = "crates/spark-postgres" }
spark-storage = { path = "crates/spark-storage" }
spark-wallet = { path = "crates/spark-wallet", default-features = false }
syn = "2.0.105"
test-log = { version = "0.2.18", default-features = false }
testcontainers = "0.24.0"
testcontainers-modules = "0.12.1"
testdir = "0.9.3"
thiserror = "2.0.12"
tokio = { version = "1.45.1", default-features = false }
tokio-postgres = { version = "0.7.10", features = ["with-serde_json-1", "with-chrono-0_4"] }
tokio-postgres-rustls = "0.13"
mysql_async = { version = "0.34", default-features = false, features = ["minimal-rust"] }
